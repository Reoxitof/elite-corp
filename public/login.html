<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Elite Corp.</title>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #8a6f2e;
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: rgba(201,168,76,0.25);
      --white: #f0ead8;
      --white-dim: #9a9080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg);
      color: var(--white);
      font-family: Arial, sans-serif;
    }
    body {
      min-height: 100vh;
      padding: 40px 20px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 8px;
      color: var(--gold);
    }
    .logo-sub {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-top: 6px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px;
      position: relative;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .login-card h2 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--white);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .login-card p {
      font-size: 12px;
      color: var(--white-dim);
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 13px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-size: 14px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-group input:focus {
      border-color: var(--gold);
    }
    .form-group input::placeholder { color: var(--white-dim); opacity: 0.5; }
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      -webkit-appearance: none;
      appearance: none;
    }
    .btn-login:active { opacity: 0.8; }
    .error-msg {
      background: rgba(220,50,50,0.12);
      border: 1px solid rgba(220,50,50,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #ff6b6b;
      margin-top: 16px;
      display: none;
    }
    .error-msg.show { display: block; }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white-dim);
    }
    .login-footer span { color: var(--gold); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-text">ELITE CORP.</div>
      <div class="logo-sub">Système de gestion interne</div>
    </div>
    <div class="login-card">
      <h2>CONNEXION</h2>
      <p>Accès réservé aux membres d'Elite Corp.</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Adresse email</label>
          <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">SE CONNECTER</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
    <div class="login-footer">
      <span>ELITE CORP.</span> — Accès sécurisé
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      var errMsg = document.getElementById('errorMsg');

      btn.textContent = 'CONNEXION...';
      btn.disabled = true;
      errMsg.classList.remove('show');

      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        var data = await res.json();
        if (res.ok && data.success) {
          window.location.href = '/dashboard';
        } else {
          errMsg.textContent = data.error || 'Identifiants incorrects';
          errMsg.classList.add('show');
          btn.textContent = 'SE CONNECTER';
          btn.disabled = false;
        }
      } catch (err) {
        errMsg.textContent = 'Erreur de connexion au serveur';
        errMsg.classList.add('show');
        btn.textContent = 'SE CONNECTER';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
