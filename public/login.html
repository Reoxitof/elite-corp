<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Elite Corp.</title>
  <!-- Polices en non-bloquant -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>
  <noscript><link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet"/></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'"/>
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/></noscript>
  <!-- Fond immédiat pour éviter l'écran blanc/noir pendant le chargement -->
  <style>html,body{background:#0a0a0f;}</style>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #8a6f2e;
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: rgba(201,168,76,0.25);
      --white: #f0ead8;
      --white-dim: #9a9080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }
    html { height: -webkit-fill-available; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.12), transparent 60%);
      pointer-events: none;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 50px; }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      margin: auto;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-logo .logo-text {
      font-family: 'Anton', sans-serif;
      font-size: 36px;
      letter-spacing: 8px;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(201,168,76,0.4);
    }
    .login-logo .logo-sub {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-top: 6px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .login-card h2 {
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--white);
      margin-bottom: 6px;
    }
    .login-card p {
      font-size: 12px;
      color: var(--white-dim);
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white-dim);
      margin-bottom: 8px;
    }
    .form-group .input-wrap {
      position: relative;
    }
    .form-group .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold-dim);
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }
    .form-group input::placeholder { color: var(--white-dim); opacity: 0.5; }
    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(201,168,76,0.45);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login.loading { opacity: 0.7; pointer-events: none; }
    .error-msg {
      background: rgba(220,50,50,0.12);
      border: 1px solid rgba(220,50,50,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #ff6b6b;
      margin-top: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--white-dim);
    }
    .login-footer span { color: var(--gold); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-text">ELITE CORP.</div>
      <div class="logo-sub">Système de gestion interne</div>
    </div>
    <div class="login-card">
      <h2>CONNEXION</h2>
      <p>Accès réservé aux membres d'Elite Corp.</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Adresse email</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email"/>
          </div>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
          </div>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          SE CONNECTER
        </button>
        <div class="error-msg" id="errorMsg">
          <i class="fas fa-exclamation-circle"></i>
          <span id="errorText">Identifiants incorrects</span>
        </div>
      </form>
    </div>
    <div class="login-footer">
      <span>ELITE CORP.</span> — Accès sécurisé
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errMsg = document.getElementById('errorMsg');
      const errText = document.getElementById('errorText');

      btn.classList.add('loading');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CONNEXION...';
      errMsg.classList.remove('show');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = '/dashboard';
        } else {
          errText.textContent = data.error || 'Identifiants incorrects';
          errMsg.classList.add('show');
          btn.classList.remove('loading');
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> SE CONNECTER';
        }
      } catch (err) {
        errText.textContent = 'Erreur de connexion au serveur';
        errMsg.classList.add('show');
        btn.classList.remove('loading');
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> SE CONNECTER';
      }
    });
  </script>
</body>
</html>
