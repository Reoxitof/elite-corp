<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Elite Corp.</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: #0a0a0f; }
    body {
      background: #0a0a0f;
      color: #f0ead8;
      font-family: Arial, Helvetica, sans-serif;
      padding: 40px 20px 40px 20px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-text {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 8px;
      color: #c9a84c;
    }
    .logo-sub {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9a9080;
      margin-top: 6px;
    }
    .login-card {
      background: #16161f;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 36px 28px;
    }
    .gold-line {
      height: 3px;
      background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      border-radius: 16px 16px 0 0;
      margin: -36px -28px 28px -28px;
    }
    .login-card h2 {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #f0ead8;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .login-card p {
      font-size: 12px;
      color: #9a9080;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a9080;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 13px 14px;
      background: #111118;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 10px;
      color: #f0ead8;
      font-size: 14px;
      font-family: Arial, Helvetica, sans-serif;
      outline: none;
    }
    .form-group input:focus {
      border-color: #c9a84c;
    }
    .btn-login {
      width: 100%;
      padding: 15px;
      background: #c9a84c;
      border: none;
      border-radius: 10px;
      color: #000000;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      font-family: Arial, Helvetica, sans-serif;
    }
    .btn-login:active { opacity: 0.8; }
    .error-msg {
      background: rgba(220,50,50,0.15);
      border: 1px solid rgba(220,50,50,0.35);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #ff6b6b;
      margin-top: 16px;
      display: none;
    }
    .error-msg.show { display: block; }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #9a9080;
    }
    .login-footer span { color: #c9a84c; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-text">ELITE CORP.</div>
      <div class="logo-sub">Système de gestion interne</div>
    </div>
    <div class="login-card">
      <div class="gold-line"></div>
      <h2>CONNEXION</h2>
      <p>Accès réservé aux membres d'Elite Corp.</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Adresse email</label>
          <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">SE CONNECTER</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>
    <div class="login-footer">
      <span>ELITE CORP.</span> — Accès sécurisé
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn = document.getElementById('loginBtn');
      var errMsg = document.getElementById('errorMsg');
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;

      btn.textContent = 'CONNEXION...';
      btn.disabled = true;
      errMsg.classList.remove('show');

      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/login', true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.withCredentials = true;
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        try {
          var data = JSON.parse(xhr.responseText);
          if (xhr.status === 200 && data.success) {
            // Stocker le sessionId
            if (data.sessionId) {
              localStorage.setItem('ec_sid', data.sessionId);
              // Aussi dans sessionStorage comme backup
              try { sessionStorage.setItem('ec_sid', data.sessionId); } catch(e) {}
            }
            var sid = data.sessionId || '';
            // Charger le dashboard en injectant le sid dans l'URL
            window.location.replace('/dashboard?sid=' + encodeURIComponent(sid));
          } else {
            errMsg.textContent = data.error || 'Identifiants incorrects';
            errMsg.classList.add('show');
            btn.textContent = 'SE CONNECTER';
            btn.disabled = false;
          }
        } catch(err) {
          errMsg.textContent = 'Erreur de connexion au serveur';
          errMsg.classList.add('show');
          btn.textContent = 'SE CONNECTER';
          btn.disabled = false;
        }
      };
      xhr.onerror = function() {
        errMsg.textContent = 'Erreur réseau';
        errMsg.classList.add('show');
        btn.textContent = 'SE CONNECTER';
        btn.disabled = false;
      };
      xhr.send(JSON.stringify({ email: email, password: password }));
    });
  </script>
</body>
</html>
